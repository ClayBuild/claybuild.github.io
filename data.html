<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data — Clay</title>
<link rel="icon" type="image/png" href="./assets/favicon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="./css/main.css?v=40">
<style>
  .data-header { padding: 1.5rem 0 1rem; }
  .data-header .row1 { display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .data-header h1 { font-size: 1.6rem; }
  .data-header .back-link { color: var(--text-3); font-size: 0.85rem; font-weight: 600; }
  .data-header .back-link:hover { color: var(--accent); }

  .data-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 0; overflow-x: auto; overflow-y: hidden; }
  .data-tab {
    padding: 0.75rem 1.25rem; cursor: pointer; font-weight: 700; font-size: 0.9rem;
    color: var(--text-3); border: none; background: transparent; border-radius: var(--radius) var(--radius) 0 0;
    transition: all .15s; white-space: nowrap; position: relative; display: flex; align-items: center; gap: 0.4rem;
  }
  .data-tab:hover { color: var(--text); }
  .data-tab.active { color: var(--accent); }
  .data-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--accent); }
  .data-tab .count { background: var(--accent-light); color: var(--accent); font-size: 0.72rem; padding: 0.1rem 0.45rem; border-radius: 9999px; font-weight: 700; }
  .data-tab.active .count { background: var(--accent); color: #FFF; }

  .data-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
  .data-card {
    background: var(--glass-bg); backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
    border: 1px solid var(--glass-border); border-radius: var(--radius-md); padding: 1.25rem;
    transition: transform .15s, box-shadow .15s; position: relative;
  }
  .data-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .data-card .card-fields { display: flex; flex-direction: column; gap: 0.5rem; }
  .data-card .field-row { display: flex; flex-direction: column; gap: 0.1rem; }
  .data-card .field-label { font-size: 0.72rem; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.03em; }
  .data-card .field-value { font-size: 0.92rem; color: var(--text); font-weight: 600; word-break: break-word; }
  .data-card .card-time { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
  .data-card .card-delete {
    position: absolute; top: 0.75rem; right: 0.75rem;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(239,68,68,0.1); color: var(--error); border: none;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: all .15s; font-size: 0.75rem; opacity: 0;
  }
  .data-card:hover .card-delete { opacity: 1; }
  .data-card .card-delete:hover { background: var(--error); color: #FFF; }

  .data-empty { text-align: center; padding: 3rem 1.5rem; }
  .data-empty .icon { font-size: 2.5rem; color: var(--accent); opacity: 0.3; margin-bottom: 0.75rem; }
  .data-empty h3 { font-size: 1.1rem; margin-bottom: 0.35rem; }
  .data-empty p { color: var(--text-3); font-size: 0.88rem; max-width: 360px; margin: 0 auto; }

  .data-stats { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .data-stat-mini { background: var(--glass-bg); backdrop-filter: blur(8px); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 0.85rem 1.25rem; display: flex; align-items: center; gap: 0.6rem; }
  .data-stat-mini .n { font-size: 1.5rem; font-weight: 900; color: var(--accent); line-height: 1; }
  .data-stat-mini .l { font-size: 0.78rem; color: var(--text-3); font-weight: 600; }

  .export-btn { background: var(--glass-bg); backdrop-filter: blur(8px); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 0.6rem 1rem; font-size: 0.82rem; font-weight: 600; color: var(--text-2); cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 0.4rem; }
  .export-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<div class="ambient-bg">
  <div class="ambient-blob b1"></div>
  <div class="ambient-blob b2"></div>
</div>

<header class="topbar">
  <div class="topbar-inner">
    <a href="./index.html" class="brand"><img src="./assets/clay-logo.png" alt="Clay" class="logo-img"></a>
    <nav>
      <a href="./dashboard.html">Dashboard</a>
      <a href="#" id="sign-out"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sign out</a>
    </nav>
  </div>
</header>

<div class="container" style="padding-bottom:4rem;">
  <section class="data-header">
    <div class="row1">
      <div>
        <a href="./project.html?id=PROJECT_ID_PLACEHOLDER" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to project</a>
        <h1 style="margin-top:0.3rem;">Collected Data</h1>
        <p class="text-muted" style="font-size:0.88rem; margin-top:0.2rem;" id="proj-subtitle">Data from your website's forms</p>
      </div>
      <button class="export-btn" id="export-csv"><i class="fa-solid fa-download"></i> Export CSV</button>
    </div>
  </section>

  <div class="data-stats" id="data-stats"></div>

  <div class="data-tabs" id="data-tabs"></div>

  <div id="data-content">
    <div style="text-align:center; padding:3rem;"><div class="spinner spinner-lg" style="margin:0 auto;"></div><div style="margin-top:1rem;color:var(--text-3);font-size:0.9rem;">Loading your data...</div></div>
  </div>
</div>

<footer class="footer">
  <div class="container footer-inner">
    <a href="./index.html" class="brand"><img src="./assets/clay-logo.png" alt="Clay" class="logo-img"></a>
    <div style="font-size:0.82rem; color:var(--text-muted);">&copy; 2026 Clay</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/config.js?v=40"></script>
<script src="./js/supabase.js?v=40"></script>
<script>
(async function () {
  var session = await clayRequireAuth();
  if (!session) return;

  document.getElementById('sign-out').addEventListener('click', async function(e) { e.preventDefault(); await claySignOut(); });

  var projectId = new URLSearchParams(location.search).get('id');
  if (!projectId) { toast('No project ID specified.'); setTimeout(function() { location.href = './dashboard.html'; }, 1200); return; }

  // Fix back link
  document.querySelector('.back-link').href = './project.html?id=' + projectId;

  // Load project name
  try {
    var { data: proj } = await supabase.from('projects').select('name').eq('id', projectId).single();
    if (proj) document.getElementById('proj-subtitle').textContent = 'Data from ' + proj.name + "'s website forms";
  } catch(e) {}

  // Load collections (tables)
  var { data: collections, error: collError } = await supabase
    .from('project_collections')
    .select('*')
    .eq('project_id', projectId)
    .order('created_at', { ascending: true });

  if (collError || !collections || collections.length === 0) {
    document.getElementById('data-content').innerHTML =
      '<div class="data-empty"><div class="icon"><i class="fa-solid fa-database"></i></div>' +
      '<h3>No data collected yet</h3>' +
      '<p>When visitors submit forms on your published website, their responses will appear here as cards.</p></div>';
    document.getElementById('data-tabs').style.display = 'none';
    document.getElementById('data-stats').style.display = 'none';
    document.getElementById('export-csv').style.display = 'none';
    return;
  }

  // Load all records for this project
  var { data: allRecords, error: recError } = await supabase
    .from('project_records')
    .select('*')
    .eq('project_id', projectId)
    .order('created_at', { ascending: false });

  if (recError) { toast('Error loading data: ' + recError.message); return; }
  allRecords = allRecords || [];

  // Render stats
  var totalRecords = allRecords.length;
  var totalCollections = collections.length;
  document.getElementById('data-stats').innerHTML =
    '<div class="data-stat-mini"><div class="n">' + totalRecords + '</div><div class="l">Total entries</div></div>' +
    '<div class="data-stat-mini"><div class="n">' + totalCollections + '</div><div class="l">Collections</div></div>';

  // Render tabs
  var tabsContainer = document.getElementById('data-tabs');
  tabsContainer.innerHTML = collections.map(function(c, i) {
    var count = allRecords.filter(function(r) { return r.collection_name === c.name; }).length;
    return '<button class="data-tab' + (i === 0 ? ' active' : '') + '" data-collection="' + c.name + '" data-idx="' + i + '">' +
      c.name + ' <span class="count">' + count + '</span></button>';
  }).join('');

  var currentCollection = collections[0].name;

  // Tab switching
  tabsContainer.querySelectorAll('.data-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      tabsContainer.querySelectorAll('.data-tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      currentCollection = tab.dataset.collection;
      renderRecords();
    });
  });

  // Get schema labels for a collection
  function getSchemaLabels(collectionName) {
    var coll = collections.find(function(c) { return c.name === collectionName; });
    if (!coll || !coll.schema) return null;
    return coll.schema;
  }

  // Render records as cards
  function renderRecords() {
    var records = allRecords.filter(function(r) { return r.collection_name === currentCollection; });
    var content = document.getElementById('data-content');

    if (records.length === 0) {
      content.innerHTML =
        '<div class="data-empty"><div class="icon"><i class="fa-regular fa-folder-open"></i></div>' +
        '<h3>No entries in ' + currentCollection + ' yet</h3>' +
        '<p>When someone submits a form on your website, the data will appear here.</p></div>';
      return;
    }

    var schema = getSchemaLabels(currentCollection);
    var keys = schema ? Object.keys(schema) : (records[0] && records[0].record ? Object.keys(records[0].record) : []);

    content.innerHTML = '<div class="data-cards">' + records.map(function(rec) {
      var fields = keys.map(function(key) {
        var label = schema && schema[key] ? schema[key] : key;
        var value = rec.record ? rec.record[key] : '';
        if (value === null || value === undefined) value = '';
        return '<div class="field-row"><div class="field-label">' + escapeHtml(label) + '</div><div class="field-value">' + escapeHtml(String(value)) + '</div></div>';
      }).join('');

      return '<div class="data-card" data-id="' + rec.id + '">' +
        '<button class="card-delete" data-id="' + rec.id + '" title="Delete"><i class="fa-solid fa-trash"></i></button>' +
        '<div class="card-fields">' + fields + '</div>' +
        '<div class="card-time"><i class="fa-regular fa-clock"></i> ' + new Date(rec.created_at).toLocaleString() + '</div>' +
      '</div>';
    }).join('') + '</div>';

    // Wire up delete buttons
    content.querySelectorAll('.card-delete').forEach(function(btn) {
      btn.addEventListener('click', async function(e) {
        e.stopPropagation();
        var recId = btn.dataset.id;
        if (!confirm('Delete this entry?')) return;
        var { error: delErr } = await supabase.from('project_records').delete().eq('id', recId);
        if (delErr) { toast('Could not delete: ' + delErr.message); return; }
        btn.closest('.data-card').remove();
        allRecords = allRecords.filter(function(r) { return r.id !== recId; });
        // Update tab count
        var tab = tabsContainer.querySelector('[data-collection="' + currentCollection + '"]');
        var count = allRecords.filter(function(r) { return r.collection_name === currentCollection; }).length;
        tab.querySelector('.count').textContent = count;
        // Update total stat
        document.querySelector('.data-stat-mini .n').textContent = allRecords.length;
        toast('Entry deleted.');
        if (count === 0) renderRecords();
      });
    });
  }

  renderRecords();

  // Export CSV
  document.getElementById('export-csv').addEventListener('click', function() {
    if (allRecords.length === 0) { toast('No data to export.'); return; }
    var csv = '';
    collections.forEach(function(coll) {
      var records = allRecords.filter(function(r) { return r.collection_name === coll.name; });
      if (records.length === 0) return;
      var schema = coll.schema || {};
      var keys = Object.keys(schema).length > 0 ? Object.keys(schema) : Object.keys(records[0].record || {});
      csv += '\n"' + coll.name + '"\n';
      csv += keys.map(function(k) { return '"' + (schema[k] || k) + '"'; }).join(',') + ',Submitted\n';
      records.forEach(function(rec) {
        csv += keys.map(function(k) {
          var v = rec.record ? (rec.record[k] || '') : '';
          return '"' + String(v).replace(/"/g, '""') + '"';
        }).join(',') + ',"' + new Date(rec.created_at).toISOString() + '"\n';
      });
    });
    var blob = new Blob([csv], { type: 'text/csv' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'clay-data-export.csv'; a.click();
    URL.revokeObjectURL(url);
    toast('Data exported!');
  });

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c) { return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]; });
  }
})();
</script>
</body>
</html>
