<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — Clay</title>
<link rel="icon" type="image/png" href="./assets/favicon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="./css/main.css?v=34">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <a href="./index.html" class="brand" style="justify-content:center;"><img src="./assets/clay-logo.png" alt="Clay" class="logo-img" style="height:40px;"></a>
    <h1 style="text-align:center;">Start building.</h1>
    <p class="sub">No email verification. No credit card. Just answer a few questions and you're online.</p>

    <div id="err" class="alert alert-error hidden" style="margin-bottom:1rem;"></div>

    <form id="signup-form" autocomplete="on">
      <div class="field">
        <label for="name">Full name</label>
        <input class="input" id="name" name="name" type="text" placeholder="Jamie Rivera" required>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input class="input" id="email" name="email" type="email" autocomplete="email" placeholder="you@studio.com" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input class="input" id="password" name="password" type="password" autocomplete="new-password" placeholder="At least 8 characters" required minlength="8">
          <button type="button" class="pw-toggle" data-target="password" tabindex="-1" aria-label="Show password"><i class="fa-regular fa-eye"></i></button>
        </div>
        <div class="field-hint">Min 8 characters.</div>
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <div class="pw-wrap">
          <input class="input" id="confirm" name="confirm" type="password" autocomplete="new-password" placeholder="Re-enter your password" required minlength="8">
          <button type="button" class="pw-toggle" data-target="confirm" tabindex="-1" aria-label="Show password"><i class="fa-regular fa-eye"></i></button>
        </div>
      </div>
      <button type="submit" class="btn btn-block btn-lg" id="submit-btn">
        <span class="btn-label">Create account</span>
        <i class="fa-solid fa-arrow-right"></i>
      </button>
    </form>

    <div class="alt">Already have an account? <a href="./login.html">Sign in</a></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/config.js?v=34"></script>
<script src="./js/supabase.js?v=34"></script>
<script>
(function () {
  document.querySelectorAll('.pw-toggle').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var target = document.getElementById(btn.dataset.target);
      if (!target) return;
      if (target.type === 'password') { target.type = 'text'; btn.innerHTML = '<i class="fa-regular fa-eye-slash"></i>'; }
      else { target.type = 'password'; btn.innerHTML = '<i class="fa-regular fa-eye"></i>'; }
    });
  });
  clayRedirectIfAuthed();
  var form = document.getElementById('signup-form');
  var err = document.getElementById('err');
  var btn = document.getElementById('submit-btn');
  form.addEventListener('submit', async function (e) {
    e.preventDefault(); err.classList.add('hidden');
    var name = document.getElementById('name').value.trim();
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var confirm = document.getElementById('confirm').value;
    if (name.length < 2) return showError('Please enter your full name.');
    if (password.length < 8) return showError('Password must be at least 8 characters.');
    if (password !== confirm) return showError('Passwords do not match.');
    btn.disabled = true; btn.querySelector('.btn-label').textContent = 'Creating...';
    var spinner = document.createElement('span'); spinner.className = 'spinner spinner-on-accent'; btn.insertBefore(spinner, btn.firstChild);
    try {
      var { data, error } = await supabase.auth.signUp({ email: email, password: password, options: { data: { full_name: name } } });
      if (error) throw error;
      toast('Account created. Welcome to Clay!');
      var idea = new URLSearchParams(location.search).get('idea');
      setTimeout(function () { window.location.href = idea ? './new-project.html?idea=' + encodeURIComponent(idea) : './dashboard.html'; }, 600);
    } catch (e) { showError(e.message || 'Sign-up failed.'); btn.disabled = false; btn.querySelector('.btn-label').textContent = 'Create account'; if (spinner.parentNode) spinner.remove(); }
  });
  function showError(msg) { err.textContent = msg; err.classList.remove('hidden'); }
})();
</script>
</body>
</html>
