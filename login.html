<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Clay</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="./css/main.css">
</head>
<body>

<div class="auth-wrap">
  <aside class="auth-aside">
    <a href="./index.html" class="brand"><span class="mark" style="background:var(--paper)"></span> Clay <span class="sub" style="color:#a8a599">/ build</span></a>
    <div class="quote">
      Pick up exactly where you left off — your projects, your dossiers, your <em>published URLs</em>.
    </div>
    <div class="meta">
      DOSSIER · CONTINUE · 001 / 999
    </div>
  </aside>

  <main class="auth-main">
    <div class="auth-card">
      <span class="kicker">— Welcome back</span>
      <h1>Sign in.</h1>
      <p class="sub">Continue to your dashboard and projects.</p>

      <div id="err" class="alert alert-error hidden" style="margin-bottom:1rem;"></div>

      <form id="login-form" autocomplete="on">
        <div class="field">
          <label for="email">Email</label>
          <input class="input" id="email" name="email" type="email" autocomplete="email" placeholder="you@studio.com" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input class="input" id="password" name="password" type="password" autocomplete="current-password" placeholder="Your password" required>
            <button type="button" class="pw-toggle" data-target="password" tabindex="-1"><i class="fa-regular fa-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="btn btn-block btn-lg" id="submit-btn">
          <span class="btn-label">Sign in</span>
          <i class="fa-solid fa-arrow-right"></i>
        </button>
      </form>

      <div class="alt">
        New to Clay? <a href="./signup.html">Create an account</a>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/config.js"></script>
<script src="./js/supabase.js"></script>
<script>
(function () {
  clayRedirectIfAuthed();

  document.querySelectorAll('.pw-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = document.getElementById(btn.dataset.target);
      if (target.type === 'password') {
        target.type = 'text';
        btn.innerHTML = '<i class="fa-regular fa-eye-slash"></i>';
      } else {
        target.type = 'password';
        btn.innerHTML = '<i class="fa-regular fa-eye"></i>';
      }
    });
  });

  const form = document.getElementById('login-form');
  const err = document.getElementById('err');
  const btn = document.getElementById('submit-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.classList.add('hidden');

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.querySelector('.btn-label').textContent = 'Signing in…';
    btn.insertAdjacentHTML('afterbegin', '<span class="spinner"></span>');

    try {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;
      toast('Welcome back.');
      const next = new URLSearchParams(location.search).get('next') || './dashboard.html';
      setTimeout(() => { window.location.href = next; }, 400);
    } catch (e) {
      showError(e.message || 'Sign-in failed. Check your email and password.');
      btn.disabled = false;
      btn.querySelector('.btn-label').textContent = 'Sign in';
      btn.querySelector('.spinner')?.remove();
    }
  });

  function showError(msg) {
    err.textContent = msg;
    err.classList.remove('hidden');
  }
})();
</script>
</body>
</html>
